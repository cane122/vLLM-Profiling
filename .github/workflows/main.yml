name: Strix Halo Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Create tokens.yaml
        run: |
          mkdir -p .config
          echo "tokens: {}" > .config/tokens.yaml
      - name: Run vLLM profiling
        env:
            HF_TOKEN: ${{ secrets.HF_TOKEN }}
            MY_FLAG: "1"
        run: |
          python3 scripts/host/orchestrator.py run \
            --iterations 1

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: profiling-logs
          path: .logs/
