name: Strix Halo Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Run vLLM profiling
        run: |
          python3 scripts/host/orchestrator.py run \
            --image-name vllm-image \
            --script qwen.py \
            --duration 60 \
            --iterations 1

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: profiling-logs
          path: .logs/
