name: Strix Halo Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Cache Hugging Face & Model Compilations
        uses: actions/cache@v4
        with:
          path: |
            .cache/huggingface
            .cache/vllm
            .cache/triton
          key: ${{ runner.os }}-vllm-profiling-cache
          restore-keys: |
            ${{ runner.os }}-vllm-profiling-cache

      # 1. Clean the workspace directories safely
      - name: Prepare workspace
        run: |
          mkdir -p .config
          mkdir -p .logs
          mkdir -p .cache/huggingface
          mkdir -p .cache/vllm
          mkdir -p .cache/triton

      - name: Create tokens.yaml
        run: |
          echo "tokens: {}" > .config/tokens.yaml

      - name: Generate GPU config
        run: |
          scripts/host/generate_gpu_yaml.sh

      # 2. Check/Pull the image (Docker skips downloading layers if they already exist)
      - name: Pull Docker image
        run: |
          docker pull hyoon11/vllm-dev:20260121_43_py3.12_torch2.9_triton3.5_navi_upstream_6a09612_ubuntu24.04

      # 3. Run the container to profile the models (Fixed orchestrator argument syntax)
      - name: Run vLLM profiling
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          set -x
          python3 scripts/host/orchestrator.py \
            --duration 60 \
            Qwen/Qwen3-4B

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: profiling-logs
          path: .logs/

      # 4. CLEAN UP AT THE END (Optional)
      # Run this only if you are low on disk space and explicitly want to wipe the image after finishing.
      - name: Clean up Docker Image
        if: always() # Runs even if the profiling step fails
        run: |
          docker rmi hyoon11/vllm-dev:20260121_43_py3.12_torch2.9_triton3.5_navi_upstream_6a09612_ubuntu24.04